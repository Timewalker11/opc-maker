<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In - OPC Maker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">OPC Maker</a>
  </header>
  <main class="page-content">
    <h1>Log In</h1>
    <form id="login-form" class="auth-form">
      <label>
        Username
        <input type="text" name="username" required autocomplete="username">
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <p class="form-error" id="form-error"></p>
      <button type="submit" class="btn btn-signup">Log In</button>
    </form>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.textContent = '';

      const form = new FormData(e.target);
      const payload = {
        username: form.get('username').trim(),
        password: form.get('password'),
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Log in failed';
          return;
        }
        localStorage.setItem('opc_token', data.token);
        localStorage.setItem('opc_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = 'Could not reach the server';
      }
    });
  </script>
</body>
</html>
